version: "3.8"

services:
  database:
    image: mariadb:latest
    container_name: mariadb-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: holosdb
      MYSQL_USER: holosuser
      MYSQL_PASSWORD: holospassword
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: backend-container
    depends_on:
      - database
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://database:3306/holosdb
      SPRING_DATASOURCE_USERNAME: holosuser
      SPRING_DATASOURCE_PASSWORD: holospassword
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: frontend-container
    depends_on:
      - backend
    ports:
      - "8081:8081"
    restart: always

volumes:
  mariadb_data:
