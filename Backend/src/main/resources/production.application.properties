# Spring Properties
spring.application.name=Holos
holos.jwtSecret=h01os4EverSecretKey
holos.jwtExpirationMs=57600000

# Server Properties
server.host=${SERVER_HOST}
server.database=${DATABASE_NAME}
server.url=${DATABASE_URL}
server.user=${DATABASE_USERNAME}
server.password=${DATABASE_PASSWORD}
server.port=${DATABASE_PORT}


spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=ERROR

spring.datasource.initialization-mode=always
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

logging.level.org.springframework.jdbc.datasource.init=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true