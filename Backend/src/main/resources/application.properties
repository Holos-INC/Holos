spring.application.name=Holos
server.port=8080

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver


spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=ERROR

spring.datasource.initialization-mode=always
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

logging.level.org.springframework.jdbc.datasource.init=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

petclinic.app.jwtSecret = h01os4EverSecretKey
petclinic.app.jwtExpirationMs = 57600000

# App Properties
holos.jwtSecret= h01os4EverSecretKey
# Expiration set to 16 hours 
holos.jwtExpirationMs= 57600000 